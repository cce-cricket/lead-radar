name: Lead Radar

on:
  workflow_dispatch:     # allows manual run from GitHub UI
  schedule:
    - cron: "0 * * * *"  # runs every hour

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas gspread oauth2client openai

      - name: Run script
        run: python lead_radar.py
