name: Lead Radar

on:
  schedule:
    - cron: "0 * * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libraries
        run: |
          pip install requests pandas gspread oauth2client openai

      - name: Run script
        run: python lead_radar.py
